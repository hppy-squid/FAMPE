<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAMPE WebApp</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        #map { height: 400px; width: 100%; }
        button { padding: 10px; margin: 10px 0; }
        .tab { display: none; }
        .tab.active { display: block; }
        .tab-buttons { margin-bottom: 20px; }
        .tab-buttons button { margin-right: 10px; }
    </style>
</head>
<body>
    <h1>FAMPE WebApp</h1>
    <button id="loginBtn">Logga in med Google</button>
    <button id="logoutBtn">Logga ut</button>
    <p id="userInfo"></p>

    <div class="tab-buttons">
        <button id="mapTab">Karta</button>
        <button id="leaderboardTab">Poänglista</button>
        <button id="userTab">Användare</button>
    </div>

    <div id="mapTabContent" class="tab active">
        <div id="map"></div>
    </div>

    <div id="leaderboardTabContent" class="tab">
        <h2>Poänglista</h2>
        <ul id="leaderboardList"></ul>
    </div>

    <div id="userTabContent" class="tab">
        <h2>Användare</h2>
        <p id="userDetails"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js"></script>
    <!-- Maps API laddas dynamiskt i app.js -->
    <script src="app.js"></script>
</body>
</html>
